services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - LLM_MOCK=true
      - DB_PATH=/app/db/test.db
    ports:
      - "8000:8000"

  playwright:
    image: mcr.microsoft.com/playwright:v1.40.0
    depends_on:
      - app
    working_dir: /app
    volumes:
      - ..:/app
    command: npx playwright test --config=test/playwright.config.ts
